<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Madrasa Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            padding-bottom: 90px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="app-header shadow-sm position-sticky top-0 z-3">
        <div>
            <h1 class="mb-1 fw-bold"><i class="bi bi-moon-stars-fill text-accent me-2"></i>Tracker</h1>
            <p class="app-header-subtitle mb-0 fw-medium" id="madrasaNameDisplay">Loading...</p>
        </div>
    </div>

    <!-- Announcement Banner -->
    <div id="globalAnnouncementBanner" class="container mt-3 d-none"></div>

    <div class="container mb-5 pb-5">

        <!-- Today's Date Card -->
        <div class="card mb-4 shadow text-white rounded-4 border-0 position-relative overflow-hidden"
            style="background: linear-gradient(135deg, var(--primary-green), #145947);">
            <div class="position-absolute opacity-25" style="top: -20px; right: -20px; font-size: 150px;">
                <i class="bi bi-calendar-event"></i>
            </div>
            <div class="card-body text-left py-4 px-4 position-relative z-1">
                <h6 class="mb-1 text-accent text-uppercase fw-bold" style="letter-spacing: 1px;">Today's Date</h6>
                <h3 class="mb-0 fw-bold" id="todayDate"></h3>
            </div>
        </div>

        <!-- Class Selector Filter -->
        <div class="mb-4">
            <label class="form-label text-muted fw-bold small"><i class="bi bi-funnel-fill me-1"></i>Filter Leaderboard
                by Class</label>
            <select id="classFilter"
                class="form-select form-select-lg bg-white border-0 shadow-sm rounded-pill fw-medium px-4">
                <option value="all">🏆 All Classes</option>
            </select>
        </div>

        <!-- Leaderboards -->
        <h5 class="text-primary fw-bold mb-3 d-flex align-items-center"><i
                class="bi bi-trophy-fill text-accent me-2 fs-4"></i>Leaderboards</h5>

        <ul class="nav nav-pills nav-fill mb-3 bg-white p-1 rounded-pill shadow-sm" id="leaderboardTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active rounded-pill fw-bold" id="today-tab" data-bs-toggle="pill"
                    data-bs-target="#today" type="button" role="tab" aria-selected="true">Today</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link rounded-pill fw-bold" id="weekly-tab" data-bs-toggle="pill"
                    data-bs-target="#weekly" type="button" role="tab" aria-selected="false">Weekly</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link rounded-pill fw-bold" id="monthly-tab" data-bs-toggle="pill"
                    data-bs-target="#monthly" type="button" role="tab" aria-selected="false">Monthly</button>
            </li>
        </ul>

        <div class="tab-content" id="leaderboardTabsContent">
            <div class="tab-pane fade show active" id="today" role="tabpanel" tabindex="0">
                <div class="card shadow-sm border-0 rounded-4 p-2 bg-white">
                    <ul class="list-group list-group-flush gap-2" id="todayList">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary spinner-border-sm"></div>
                        </div>
                    </ul>
                </div>
            </div>
            <div class="tab-pane fade" id="weekly" role="tabpanel" tabindex="0">
                <div class="card shadow-sm border-0 rounded-4 p-2 bg-white">
                    <ul class="list-group list-group-flush gap-2" id="weeklyList"></ul>
                </div>
            </div>
            <div class="tab-pane fade" id="monthly" role="tabpanel" tabindex="0">
                <div class="card shadow-sm border-0 rounded-4 p-2 bg-white">
                    <ul class="list-group list-group-flush gap-2" id="monthlyList"></ul>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/home.js"></script>
</body>

</html>
