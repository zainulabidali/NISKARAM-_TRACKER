<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Madrasa Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            padding-bottom: 90px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            font-size: 2.2rem;
        }
    </style>
</head>

<body class="bg-light">

    <div class="app-header shadow-sm position-sticky top-0 z-3">
        <div>
            <h1 class="mb-1 fw-bold"><i class="bi bi-person-circle text-accent me-2"></i>Profile</h1>
            <p class="app-header-subtitle mb-0 fw-medium">Application Settings</p>
        </div>
    </div>

    <div class="container mb-5 pb-5 mt-4">

        <!-- Madrasa Info Card -->
        <div class="card mb-4 shadow rounded-4 border-0 p-4 text-center bg-white position-relative"
            style="background: linear-gradient(180deg, rgba(201,162,39,0.05) 0%, rgba(244,247,246,0) 100%);"
            id="userInfoCard">

            <div
                class="avatar bg-primary text-white mx-auto rounded-circle d-flex align-items-center justify-content-center shadow-lg mb-3 profile-avatar">
                <i class="bi bi-building"></i>
            </div>
            <h4 class="fw-bold mb-1 text-dark" id="madrasaName">Loading...</h4>
            <p class="text-muted small fw-bold mb-4">
                <span class="badge bg-light text-primary border p-2 px-3 rounded-pill shadow-sm">Your Madrasa</span>
            </p>

            <button id="leaveMadrasaBtn"
                class="btn btn-outline-danger w-100 rounded-pill fw-bold py-2 shadow-sm d-none">
                <i class="bi bi-box-arrow-right me-1"></i> Disconnect from Madrasa
            </button>
        </div>

        <!-- System Info -->
        <div class="card mb-4 shadow-sm border-0 rounded-4 p-5 text-center bg-white">
            <i class="bi bi-moon-stars-fill fs-1 text-accent mb-3 d-block"></i>
            <h5 class="fw-bold mb-1 text-primary">Madrasa Niskaram Tracker</h5>
            <p class="text-muted small mb-0 fw-bold opacity-75">Version 1.0.0 &copy; 2026</p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>

</html>
