<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report - Madrasa Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { padding-bottom: 90px; background-color: #f8f9fa; }
        .hero-card {
            background: linear-gradient(135deg, #155e4d 0%, #1f7a63 55%, #28a98a 100%);
            color: white; border-radius: 1.25rem; position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .hero-avatar {
            width: 60px; height: 60px; font-size: 1.8rem; background: white; color: var(--primary-green, #155e4d);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem; padding: 12px; text-align: center; flex: 1;
        }
        .prayer-box {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0.75rem; text-align: center; flex: 1; padding: 8px 4px;
        }
        .prayer-counts { font-size: 0.7rem; color: rgba(255,255,255,0.8); display: flex; flex-direction: column; gap: 2px; }
        .prayer-counts span { font-weight: 700; }
        .j-count { color: #a7f3d0; } /* light green */
        .i-count { color: #fef08a; } /* light yellow */
        .m-count { color: #fca5a5; } /* light red */
        .chart-wrapper { height: 260px; width: 100%; }
        .filter-btn { border-radius: 50px; font-weight: 600; padding: 6px 20px; transition: 0.25s; border: none; }
        .filter-btn.active { background-color: #198754; color: white; box-shadow: 0 4px 10px rgba(25, 135, 84, 0.3); }
        .filter-btn:not(.active) { background-color: #e9ecef; color: #6c757d; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="app-header shadow-sm position-sticky top-0 z-3 d-flex justify-content-between align-items-center bg-white px-3 py-3">
        <div>
            <h3 class="mb-0 fw-bold"><i class="bi bi-file-earmark-bar-graph-fill text-success me-2"></i>Report</h3>
            <p class="mb-0 text-muted small fw-medium">Student Performance</p>
        </div>
        <button id="btnBack" class="btn btn-light rounded-circle shadow-sm" style="width: 42px; height: 42px;">
            <i class="bi bi-arrow-left text-dark"></i>
        </button>
    </div>

    <!-- Main Container -->
    <div class="container mt-4 mb-5 pb-5">
        
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-3 fw-bold text-muted">Analyzing Records...</p>
        </div>

        <!-- Content (Hidden until loaded) -->
        <div id="reportContent" class="d-none">
            
            <!-- Filter Row -->
            <div class="d-flex justify-content-center gap-2 mb-4 bg-white p-2 rounded-pill shadow-sm d-inline-flex mx-auto w-100" style="max-width: 300px;">
                <button id="filterWeekly" class="filter-btn active flex-fill">7 Days</button>
                <button id="filterMonthly" class="filter-btn flex-fill">30 Days</button>
            </div>

            <!-- Hero Card -->
            <div class="hero-card p-4 mb-4">
                
                <!-- Student Info -->
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="hero-avatar" id="studentAvatar">?</div>
                    <div>
                        <h4 class="mb-0 fw-bold" id="studentName">Loading...</h4>
                        <p class="mb-0 opacity-75 small fw-semibold" id="className">Class...</p>
                    </div>
                </div>

                <!-- 4 Stats -->
                <div class="d-flex gap-2 mb-4">
                    <div class="stat-card">
                        <div class="fw-bold fs-4 text-warning" id="statPoints">0</div>
                        <div class="text-uppercase" style="font-size: 0.65rem; opacity: 0.8; letter-spacing: 1px;">Points</div>
                    </div>
                    <div class="stat-card">
                        <div class="fw-bold fs-4 text-info" id="statSalawat">0</div>
                        <div class="text-uppercase" style="font-size: 0.65rem; opacity: 0.8; letter-spacing: 1px;">Salawat</div>
                    </div>
                    <div class="stat-card">
                        <div class="fw-bold fs-4 text-light" id="statSubjects">0</div>
                        <div class="text-uppercase" style="font-size: 0.65rem; opacity: 0.8; letter-spacing: 1px;">Subj Pts</div>
                    </div>
                    <div class="stat-card">
                        <div class="fw-bold fs-4" style="color: #fbcfe8;" id="statDays">0</div>
                        <div class="text-uppercase" style="font-size: 0.65rem; opacity: 0.8; letter-spacing: 1px;">Days</div>
                    </div>
                </div>

                <!-- Prayer Breakdown -->
                <div class="d-flex gap-2" id="prayersContainer">
                    <!-- Populated by JS -->
                </div>
                
                <!-- Legend for prayers -->
                <div class="mt-3 d-flex justify-content-center gap-3" style="font-size: 0.70rem; opacity: 0.85;">
                    <div><span class="j-count fw-bold">■</span> Jamaat</div>
                    <div><span class="i-count fw-bold">■</span> Indiv</div>
                    <div><span class="m-count fw-bold">■</span> Missed</div>
                </div>

            </div>

            <!-- Empty State for Dates -->
            <div id="emptyState" class="d-none text-center py-4 bg-white rounded-4 shadow-sm mb-4 border border-light">
                <i class="bi bi-inbox fs-1 text-muted opacity-25 mb-2 d-block"></i>
                <h6 class="text-muted fw-bold">No Records Found</h6>
                <p class="text-muted small mb-0">No data logged for the selected period.</p>
            </div>

            <!-- Chart -->
            <div id="chartBox" class="card shadow-sm border-0 rounded-4 p-3 bg-white">
                <h6 class="fw-bold text-dark mb-3"><i class="bi bi-graph-up-arrow text-success me-2"></i>Points Trend</h6>
                <div class="chart-wrapper">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/report.js"></script>
</body>
</html>
